apiVersion: v1 
kind: ConfigMap 
metadata: 
 name: catalogue 
 namespace: roboshop 
data: 
 MONGO: "true"
 MONGO_URL: "mongodb://mongodb:27017/catalogue"
 
---
apiVersion: apps/v1 
kind: Deployment 
metadata: 
 name: catalogue
 namespace: roboshop  
 # these are replicaset labels
 labels: 
  project: roboshop 
  component: catalogue 
  tier: backend 
spec: 
 replicas: 1
 selector:
 # these labels are used to select pods  
  matchLabels: 
   project: roboshop 
   component: catalogue 
   tier: backend
  # pod defintion 
 template: 
  metadata: 
   labels: 
    project: roboshop 
    component: catalogue 
    tier: backend
  spec: 
   containers: 
   - name: catalogue 
     image: "{{ .Values.deployment.imageRepo }}:{{ .Values.deployment.imageVersion }}" 
     imagePullPolicy: Always
     envFrom: 
     - configMapRef: 
        name: catalogue  
     ports:
     - name: liveness-port
       containerPort: 8080
     resources: 
      requests: 
       cpu: "100m"
       memory: "128Mi" 
      limits:
       cpu: "100m"
       memory: "128Mi"
     readinessProbe:
      httpGet:
        path: /health
        port: liveness-port
      failureThreshold: 1
      periodSeconds: 15
     livenessProbe:
      httpGet:
        path: /health
        port: liveness-port
      failureThreshold: 1
      periodSeconds: 15 

--- 
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalogue 
  namespace: roboshop 
  labels: 
   project: roboshop 
   component: catalogue 
   tier: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalogue 
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50  # 70 is the real value 
    
