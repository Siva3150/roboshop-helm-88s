# service, headless service, statefulset, pvc

apiVersion: apps/v1  
kind: StatefulSet 
metadata: 
 name: mongodb 
 namespace: roboshop 
spec: 
 selector: 
  matchLabels:
   project: roboshop 
   component: mongodb 
   tier: db
 replicas: 2 #by default 1 
 serviceName: "mongodb-headless" # this should be head less service name
 template: 
  metadata: 
   labels: 
    project: roboshop 
    component: mongodb 
    tier: db
  spec: 
   containers: 
   - name: mongodb  
     image: "{{ .Values.desployment.imageRepo }}:{{ .Values.deployment.imageVersion }}"
     volumeMounts: 
     - name: mongodb 
       mountPath: /data/db

# This is PVC
 volumeClaimTemplates:
 - metadata:
    name: mongodb  
   spec:
    accessModes: [ "ReadWriteOnce" ]
    storageClassName: "roboshop-ebs"
    resources:
      requests:
        storage: 1Gi