apiVersion: v1 
kind: Service 
metadata: 
 name: rabbitmq 
 namespace: roboshop 
spec:
 type: {{ .Values.service.type }} 
 selector: 
  project: roboshop 
  component: rabbitmq 
  tier: db
 ports: 
  - protocol: TCP 
    port: {{ .Values.service.servicePort }} # service port
    targetPort: 5672 # container port 

--- 
apiVersion: v1 
kind: Service 
metadata: 
 name: rabbitmq-headless
 namespace: roboshop 
spec: 
 clusterIP: None
 selector: 
  project: roboshop 
  component: rabbitmq 
  tier: db
 ports: 
  - protocol: TCP 
    port: {{ .Values.service.servicePort }} # service port
    targetPort: 5672 # container port
