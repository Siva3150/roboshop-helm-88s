apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql
  namespace: roboshop
data:
  my.cnf: |
    [mysqld]
    innodb_redo_log_capacity = 2G

---


# service, headless service, statefulset, pvc

apiVersion: apps/v1  
kind: StatefulSet 
metadata: 
 name: mysql 
 namespace: roboshop 
spec: 
 selector: 
  matchLabels:
   project: roboshop 
   component: mysql 
   tier: db
 replicas: 2 #by default 1 
 serviceName: "mysql-headless" # this should be head less service name
 template: 
  metadata: 
   labels: 
    project: roboshop 
    component: mysql 
    tier: db
  spec: 
   containers: 
   - name: mysql  
     image: "{{ .Values.deployment.imageRepo }}:{{ .Values.deployment.imageVersion }}"
     volumeMounts: 
     - name: mysql 
       mountPath: /data/db
     - name: mysql-config 
       mountPath: /etc/mysql/conf.d/my.conf 
       subPath: my.cnf 
    
   volumes: 
   - name: mysql-config 
     configMap: 
      name: mysql 

# This is PVC
 volumeClaimTemplates:
 - metadata:
    name: mysql  
   spec:
    accessModes: [ "ReadWriteOnce" ]
    storageClassName: "roboshop-ebs"
    resources:
      requests:
        storage: 1Gi